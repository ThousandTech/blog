<!-- extends表明此页面继承自 base.html 文件 -->
{% extends "base.html" %} {% load staticfiles %}
<!-- 写入 base.html 中定义的 title -->
{% block title %} 写文章 {% endblock title %}
<!-- 写入 base.html 中定义的 content -->
{% block content %}
<!-- 写文章表单 -->
<div class="container">
    <div class="row">
        <div class="col-12">
            <br>
            <!-- 10 提交文章的表单 提交方式为POST 提交地址为当前页面 -->
            <form method="post" action="." enctype="multipart/form-data">
                <!-- 10 Django中需要POST数据的地方都必须有csrf_token 否则会403-->
                {% csrf_token %}
                <!-- 文章标题 -->
                <div class="form-group">
                    <!-- 标签 -->
                    <label for="title">文章标题</label>
                    <!-- 10 文本框 name是表单的类字典对象的键，与表单类字段对应 -->
                    <input type="text" class="form-control" id="title" name="title">
                </div>
                <!-- 标题图 -->
                <div class="form-group">
                    <label for="avatar">标题图(可选)</label>
                    <input type="file" class="form-control-file" id="avatar" name="avatar">
                </div>
                <!-- 文章栏目 -->
                <div class="form-group">
                    <label for="column">栏目</label>
                    <select class="form-control" 
                            id="column" 
                            name="column"
                            onchange="checkColumn()"
                    >
                            <option value="none">请选择栏目..</option>
                        {% for column in columns %}
                            <option value="{{ column.id }}">{{ column }}</option>
                        {% endfor %}
                            <option value="new">新建栏目</option>
                    </select>
                </div>
                <!-- 新建栏目 -->
                <div class="form-group" id="new_column_group" style="display:none;">
                    <label for="new_column_name">新栏目名称</label>
                    <input type="text" class="form-control" id="new_column_name" name="new_column_name">
                </div>
                <!-- 文章标签 -->
                <div class="form-group">
                    <label for="tags">标签</label>
                    <input type="text" 
                        class="form-control" 
                        id="tags" 
                        name="tags"
                        placeholder="多个标签请用英文逗号隔开"
                    >
                </div>
                <!-- 文章正文 -->
                <div class="form-group">
                    <label for="body">文章正文</label>
                    <input type="hidden" id="body" name="body">
                    <div id="body-editor" class="form-control" contenteditable="true" data-upload-url="{% url 'article:upload_body_image' %}" style="height:auto; min-height:280px; overflow:auto;"></div>
                    <small class="form-text text-muted" id="body-drop-hint">支持将图片直接拖拽到正文，也支持 Ctrl+V 粘贴截图。</small>
                    <small class="form-text text-muted" id="body-image-upload-hint"></small>
                </div>
                <!-- 提交按钮 -->
                <button type="submit" class="btn btn-primary">提交</button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script>
    function checkColumn() {
        var columnSelect = document.getElementById("column");
        var newColumnGroup = document.getElementById("new_column_group");
        if (columnSelect.value === 'new') {
            newColumnGroup.style.display = 'block';
        } else {
            newColumnGroup.style.display = 'none';
        }
    }
</script>
<script src="{% static 'js/article/editor_image_upload.js' %}"></script>
{% endblock extra_js %}
