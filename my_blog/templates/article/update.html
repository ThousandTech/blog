{% extends "base.html" %} {% load staticfiles %}
{% block title %} 更新文章 {% endblock title %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-12">
            <br>
            <form method="post" action="." enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">文章标题</label>
                    <!-- 在 value 属性中指定文本框的初始值为旧的内容，即 article 对象中的 title 字段 -->
                    <input type="text" class="form-control" id="title" name="title" value="{{ article.title }}">
                </div>
                <!-- 标题图 -->
                <div class="form-group">
                    <label for="avatar">标题图(可选)</label>
                    {% if article.avatar %}
                        <div class="mb-3">
                            <p><strong>当前标题图：</strong></p>
                            <img src="{{ article.avatar.url }}" alt="标题图" style="max-width: 300px; max-height: 200px;">
                        </div>
                    {% endif %}
                    <input type="file" class="form-control-file" id="avatar" name="avatar">
                </div>
                <!-- 文章栏目 -->
                <div class="form-group">
                    <label for="column">栏目</label>
                    <select class="form-control" 
                            id="column" 
                            name="column"
                            onchange="checkColumn()"
                    >
                            <option value="none">请选择栏目..</option>
                        {% for column in columns %}
                            <option value="{{ column.id }}"
                                {% if column.id == article.column.id %}
                                    selected
                                {% endif %}
                            >
                                {{ column }}
                            </option>
                        {% endfor %}
                            <option value="new">新建栏目</option>
                    </select>
                </div>
                <!-- 新建栏目 -->
                <div class="form-group" id="new_column_group" style="display:none;">
                    <label for="new_column_name">新栏目名称</label>
                    <input type="text" class="form-control" id="new_column_name" name="new_column_name">
                </div>
                <!-- 文章标签 -->
                <div class="form-group">
                    <label for="tags">标签</label>
                    <input type="text" 
                        class="form-control" 
                        id="tags" 
                        name="tags"
                        placeholder="多个标签请用英文逗号隔开"
                        value="{{ tags }}"
                    >
                </div>
                <div class="form-group">
                    <label for="body">文章正文</label>
                    <!-- 文本域不需要 value 属性，直接在标签体中嵌入数据即可 -->
                    <textarea type="text" class="form-control" id="body" name="body" rows="12">{{ article.body }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">提交</button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script>
    function checkColumn() {
        var columnSelect = document.getElementById("column");
        var newColumnGroup = document.getElementById("new_column_group");
        if (columnSelect.value === 'new') {
            newColumnGroup.style.display = 'block';
        } else {
            newColumnGroup.style.display = 'none';
        }
    }
</script>
{% endblock extra_js %}
